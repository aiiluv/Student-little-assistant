      v=['initialize','identify','updateOptions','pageLoad','track', 'trackAgent'];for(w=0,x=v.length;w<x;++w)(function(m){
      o[m]=o[m]||function(){o._q[m===v[0]?'unshift':'push']([m].concat([].slice.call(arguments,0)));};})(v[w]);
      y=e.createElement(n);y.async=!0;y.src='https://cdn.pendo.io/agent/static/'+apiKey+'/pendo.js';

  <img src="assets/logo.svg" alt="" class="logo">

<body>

  <!-- HERO -->
  <section class="hero">
    <div class="welcome-box">
      <span class="hi">HI!</span>
      <p class="sub">welcome to LSA, what can i help you today?</p>
    </div>
  </section>

  <!-- Space -->
   <div class="space-gap"></div>

  <!-- CATEGORY SECTION -->
  <section class="category-section">
    <div class="left">
      <h2>Don’t know<br>where to go?</h2>
      <p>explore all the tools now!</p>
    </div>

    <div class="right">
       <img src="assets/1.svg" alt="" class="card">
       <img src="assets/2.svg" alt="" class="card">
       <img src="assets/3.svg" alt="" class="card">
       <img src="assets/4.svg" alt="" class="card"> 
    </div>
  </section>

  <!-- Space -->
   <div class="space-gap"></div>
   <div class="space-gap"></div>
   <div class="space-gap"></div>

  <footer></footer>
  <footer class="footer"></footer>

  <script>
    // Pendo Track Events for LSA

    // Category names mapped to card indices
    var categoryNames = ["Study Tools", "Practice Tests", "Summaries", "Resources"];

    // Event 1: tool_category_selected
    // Fires when a student clicks one of the 4 tool category cards
    document.querySelectorAll(".card").forEach(function (card, index) {
      card.addEventListener("click", function () {
        if (typeof pendo !== "undefined" && pendo.track) {
          pendo.track("tool_category_selected", {
            categoryName: categoryNames[index] || "Unknown",
            categoryIndex: index + 1,
            referrerSection: "category_section"
          });
        }
      });
    });

    // Event 2: student_search_executed
    // Call this function when a search feature is implemented
    function trackStudentSearch(searchQuery, resultsCount, searchSource, selectedResultIndex) {
      if (typeof pendo !== "undefined" && pendo.track) {
        pendo.track("student_search_executed", {
          searchQuery: (searchQuery || "").substring(0, 100),
          resultsCount: resultsCount || 0,
          searchSource: searchSource || "main",
          selectedResultIndex: selectedResultIndex !== undefined ? selectedResultIndex : -1
        });
      }
    }

    // Event 3: tool_usage_completed
    // Call this function when a student completes using a tool
    function trackToolUsageCompleted(toolName, toolCategory, durationSeconds, completionStatus, resultType) {
      if (typeof pendo !== "undefined" && pendo.track) {
        pendo.track("tool_usage_completed", {
          toolName: toolName || "Unknown",
          toolCategory: toolCategory || "Unknown",
          durationSeconds: durationSeconds || 0,
          completionStatus: completionStatus || "completed",
          resultType: resultType || "default"
        });
      }
    }
  </script>

</body>
</html>
